<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltech Event Tickets - Login</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">

    <style>
        /* Specific tweaks for login layout */
        .login-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--s-4);
        }

        .login-header h2 {
            font-size: 2rem;
            margin-bottom: var(--s-1);
        }

        .forgot-link {
            color: var(--primary-main);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .signup-text {
            text-align: center;
            color: var(--text-dark-3);
            font-size: 0.9rem;
            margin-top: var(--s-4);
        }

        .signup-text a {
            color: var(--primary-main);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="booking-section login-card">
            <div class="login-header">
                <div class="pill-badge" style="margin-bottom: var(--s-3);">
                    <i class="fa-solid fa-building-columns" style="margin-right: 8px;"></i>Veltech University
                </div>
                <h2>Login Page</h2>
                <p style="color: var(--text-dark-3); font-size: 0.95rem;">Sign in to book your event tickets</p>
            </div>
            
            <form id="loginForm" action="login_action.php" method="POST">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" name="email" class="form-input" placeholder="student@veltech.edu.in" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: var(--s-4);">
                    <label class="form-label" for="password" style="display: flex; justify-content: space-between; align-items: center;">
                        <span>Password</span>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    Sign In
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>

                <div class="signup-text">
                    Don't have an account? <a href="signup.html">Create Account</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
